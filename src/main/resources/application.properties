spring.application.name=CadastroDeNinjas

# Carrega variaveis locais de um arquivo .env (nao versionado)
spring.config.import=optional:file:.env[.properties]

# H2 em memoria com URL fixa para facilitar acesso no console
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:cadastro_ninjas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true